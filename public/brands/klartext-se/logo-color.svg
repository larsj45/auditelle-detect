<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 40" fill="none">
  <!-- Magnifying glass icon -->
  <g transform="translate(2, 2)">
    <!-- Glass circle -->
    <circle cx="14" cy="14" r="11" stroke="#003366" stroke-width="3" fill="none"/>
    <!-- Handle -->
    <line x1="22" y1="22" x2="32" y2="32" stroke="#003366" stroke-width="3" stroke-linecap="round"/>
    <!-- Text lines inside glass -->
    <line x1="8" y1="11" x2="20" y2="11" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="16" x2="17" y2="16" stroke="#FFCC00" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- KlarText wordmark -->
  <text x="42" y="28" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#003366">Klar</tspan><tspan fill="#FFCC00">Text</tspan>
  </text>
</svg>
